# Konfigurace obou scoreboardů
scoreboards:
  enabled: true
  item_shuffle:
    title: "<color:#ffaa00><b>ItemShuffle</b>"
    lines:
      - "<dark_gray>--------------------</dark_gray>"
      - "&fČas: &d%multishuffle_time%"
      - "&fKolo: &e%multishuffle_round%&f/&6%multishuffle_maxround%</white>"
      - "&fBody: <gold>%multishuffle_points%</gold>"
      - ""
      - "&fItem: <green>%multishuffle_item%</green>"
      - "<dark_gray>--------------------</dark_gray>"
  block_shuffle:
    title: "<color:#ffaa00><b>BlockShuffle</b>"
    lines:
      - "<dark_gray>--------------------</dark_gray>"
      - "&fČas: &d%multishuffle_time%"
