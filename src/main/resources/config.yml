messages:
  # Obecné
  prefix: "&8&l[&e!&8] &e&lEvent &8▪ &r"
  no_permission: "&cNemáš oprávnění."
  config_reloaded: "&fConfig úspěšně reloadován!"
  help: "&6MultiShuffle - Použití: /is nebo /bs"
  command_usage: "&ePoužití: /<command> <start|stop|skip>"
  invalid_argument: "&cNeznámý argument."

  # Stavy hry
  game_started: "&fHra byla <green>spuštěna&f."
  game_stopped: "&fHra byla <red>ukončena&f."
  game_already_running: "&fHra již běží!"
  no_game_running: "&fŽádná hra aktuálně &cneběží&f."
  round_skipped: "&fKolo bylo &epřeskočeno<white>!"

  # Průběh hry
  target_found: "&fNašel jsi &8(&e<target>&8)&f a získáváš bod! Nyní počkej na další kolo."
  target_broadcast: "&fHráč &a<player>&f našel svůj item &8(&e<target>&8)"

  # Odpočty a vyhlašování
  countdown_title: ""
  countdown_subtitle: "&e<time>s"
  game_ending: "<white>Hra skončila! Počítám výherce..."
  place_1: "<gold>1. místo</gold>"
  place_2: "<gray>2. místo</gray>"
  place_3: "<color:#cd7f32>3. místo</color>"
  place_format: "<place> <white><player></white> - <yellow><points><white> bodů!"

  # Hodnoty Placeholderů
  placeholder_finished: "<green>Splněno</green>"
  placeholder_ability_active: "&eAktivní"
  placeholder_none: "&cN/A"

